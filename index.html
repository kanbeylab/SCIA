<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIA 第0期生 募集｜あなたの経験を「言語化」する3ヶ月</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mint: { light: '#E2F2EF', DEFAULT: '#A2D2C9', dark: '#5FAFA2' },
                        salmon: { light: '#FDECE9', DEFAULT: '#F4A698', dark: '#E27D6B' },
                        ink: '#1a1a2e',
                        paper: '#faf8f3',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        serif: ['"Noto Serif JP"', 'serif'],
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --mint-dark: #5FAFA2;
            --salmon-dark: #E27D6B;
            --ink: #1a1a2e;
            --paper: #faf8f3;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--ink);
            background: var(--paper);
            overflow-x: hidden;
            font-size: 17px;
            line-height: 1.9;
        }

        /* ===== 50代・スマホ可読性強化 ===== */
        p { line-height: 1.95; }
        @media (max-width: 768px) {
            body { font-size: 16px; }
            .text-\[10px\], .text-\[11px\], .text-\[9px\] { font-size: 12px !important; }
        }

        /* ===== TYPOGRAPHY ===== */
        .font-serif { font-family: 'Noto Serif JP', serif; }

        .text-gradient {
            background: linear-gradient(135deg, #5FAFA2 0%, #E27D6B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-gold {
            background: linear-gradient(135deg, #C9A84C, #E8D08A, #C9A84C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== HERO ===== */
        .hero-bg {
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(95,175,162,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 20% 80%, rgba(226,125,107,0.2) 0%, transparent 60%);
        }

        /* ===== QUOTE MARK ===== */
        .quote-mark {
            font-family: 'Georgia', serif;
            font-size: 12rem;
            line-height: 1;
            color: rgba(95,175,162,0.15);
            position: absolute;
            top: -2rem;
            left: -1rem;
            pointer-events: none;
            user-select: none;
        }

        /* ===== WORD UNDERLINE ===== */
        .underline-key {
            text-decoration: underline;
            text-decoration-color: var(--salmon-dark);
            text-decoration-thickness: 3px;
            text-underline-offset: 4px;
        }

        /* ===== BADGE ===== */
        .badge-zero {
            background: linear-gradient(135deg, #C9A84C, #E8D08A);
            color: #5a3e00;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-12px); }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        @keyframes typewriter {
            from { width: 0; }
            to   { width: 100%; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        @keyframes blob {
            0%   { transform: translate(0,0) scale(1); }
            33%  { transform: translate(20px,-30px) scale(1.08); }
            66%  { transform: translate(-15px,15px) scale(0.94); }
            100% { transform: translate(0,0) scale(1); }
        }

        .animate-fadeUp   { animation: fadeUp 0.8s ease both; }
        .animate-fadeIn   { animation: fadeIn 1s ease both; }
        .animate-float    { animation: float 5s ease-in-out infinite; }
        .animate-blob     { animation: blob 14s infinite alternate; }

        .shimmer-btn {
            background: linear-gradient(90deg, #E27D6B 0%, #F4A698 30%, #fff8f7 50%, #F4A698 70%, #E27D6B 100%);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        /* ===== SCROLL REVEAL ===== */
        .reveal {
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== TIMELINE ===== */
        .timeline-line {
            position: absolute;
            left: 50%;
            top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #5FAFA2, #E27D6B);
            transform: translateX(-50%);
        }

        /* ===== CARDS ===== */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 48px rgba(0,0,0,0.12);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f0f0f0; }
        ::-webkit-scrollbar-thumb { background: #A2D2C9; border-radius: 4px; }

        /* ===== STICKY HEADER ===== */
        .header-scrolled {
            background: rgba(250,248,243,0.95) !important;
            backdrop-filter: blur(12px);
            box-shadow: 0 2px 24px rgba(0,0,0,0.08);
        }

        /* ===== NOISE TEXTURE ===== */
        .noise::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ===== SECTION DIVIDER ===== */
        .wave-divider {
            display: block;
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }

        /* ===== PRICE CARD ===== */
        .price-card {
            background: white;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
        }
        .price-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(226,125,107,0.15), transparent 70%);
            border-radius: 50%;
        }

        /* ===== FAQ ===== */
        details summary::-webkit-details-marker { display: none; }

        /* ===== STEP NUMBER ===== */
        .step-num {
            font-family: 'Noto Serif JP', serif;
            font-weight: 900;
        }

        /* 引用カード */
        .quote-card {
            border-left: 4px solid var(--mint-dark);
            background: linear-gradient(135deg, rgba(162,210,201,0.08), rgba(250,248,243,1));
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ===== ICONS ===== */
        const ArrowRight = ({ size=20, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );
        const Check = ({ size=18, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>
        );
        const LinkedIn = ({ size=18, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        );
        const Menu = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        );
        const X = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );
        const Pen = ({ size=20, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        );
        const Users = ({ size=20, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const Rocket = ({ size=20, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
        );
        const Star = ({ size=18, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        );

        /* ===== SCROLL REVEAL ===== */
        const Reveal = ({ children, delay=0, className="" }) => {
            const ref = useRef();
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const obs = new IntersectionObserver(([e]) => {
                    if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); }
                }, { threshold: 0.12 });
                obs.observe(el);
                return () => obs.disconnect();
            }, []);
            return (
                <div ref={ref} className={`reveal ${className}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        /* ===== SAFE IMAGE ===== */
        const SafeImage = ({ src, alt, className }) => {
            const [err, setErr] = useState(false);
            if (err) return (
                <div className={`flex items-center justify-center bg-mint-light/40 ${className}`}>
                    <span className="text-mint-dark text-xs font-medium text-center p-2 border border-dashed border-mint rounded-lg">
                        画像未設定<br/>{src}
                    </span>
                </div>
            );
            return <img src={src} alt={alt} className={className} onError={() => setErr(true)} />;
        };

        /* ===== MAIN APP ===== */
        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            const [faqOpen, setFaqOpen] = useState(null);

            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 30);
                window.addEventListener('scroll', h);
                return () => window.removeEventListener('scroll', h);
            }, []);

            const scrollTo = (id) => {
                setMenuOpen(false);
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
            };

            const navItems = [
                { id: 'why',      label: '0期生とは' },
                { id: 'method',   label: '言語化メソッド' },
                { id: 'program',  label: 'プログラム' },
                { id: 'team',     label: 'チーム' },
                { id: 'pricing',  label: '料金' },
            ];

            const faqs = [
                { q: "0期生と1期生（通常）の違いは何ですか？", a: "カリキュラムの内容は同一です。0期生の最大の特徴は「共同開発者」という立場。人数を絞り、代表が直接関与する密度でプログラムを進めます。また、後半にフィードバックセッションを設け、あなたの声を正式な改善提案として受け付けます。" },
                { q: "LinkedInのアカウントは必要ですか？", a: "事前にLinkedInアカウントをご作成いただくことをお勧めします。プログラム開始後は、作成済みのアカウントをベースに最適化・ブランディングを進めていきます。" },
                { q: "オンライン・オフラインどちらですか？", a: "基本的にオンラインでの実施を予定しています。" },
                { q: "申し込み後のキャンセルはできますか？", a: "基本的にキャンセルはお受けしておりません。詳細は特定商取引法に基づく表記をご確認ください。" },
                { q: "定員はありますか？", a: "第0期生は3名限定です。申し込み順に締め切ります。定員に達した後にお申し込みいただいた方には、1期生（通常価格）の優先案内をお送りします。" },
            ];

            return (
                <div className="relative bg-paper">

                    {/* ===== HEADER ===== */}
                    <header className={`fixed w-full z-50 transition-all duration-300 py-4 ${scrolled ? 'header-scrolled' : 'bg-transparent'}`}>
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between">
                            <a href="site06.html" className="flex items-center gap-2 group">
                                <span className="bg-mint-dark text-white font-black px-2 py-1 rounded-lg text-lg group-hover:bg-salmon-dark transition-colors">S</span>
                                <span className={`font-black text-xl tracking-tight transition-colors ${scrolled ? 'text-ink' : 'text-white'}`}>SCIA</span>
                                <span className={`text-xs font-medium hidden md:block ml-1 transition-colors ${scrolled ? 'text-gray-500' : 'text-white/70'}`}>セカンドキャリア・インキュベーション協会</span>
                            </a>

                            <nav className="hidden md:flex items-center gap-6">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => scrollTo(item.id)}
                                        className={`text-base font-medium transition-colors ${scrolled ? 'text-gray-600 hover:text-mint-dark' : 'text-white/80 hover:text-white'}`}>
                                        {item.label}
                                    </button>
                                ))}
                                <button onClick={() => scrollTo('apply')}
                                    className="ml-2 bg-salmon hover:bg-salmon-dark text-white px-5 py-2 rounded-full text-sm font-bold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5">
                                    申し込む
                                </button>
                            </nav>

                            <button className="md:hidden" onClick={() => setMenuOpen(!menuOpen)}>
                                {menuOpen
                                    ? <X size={26} className={scrolled ? "text-ink" : "text-white"} />
                                    : <Menu size={26} className={scrolled ? "text-ink" : "text-white"} />
                                }
                            </button>
                        </div>

                        {/* Mobile menu */}
                        <div className={`md:hidden bg-paper/95 backdrop-blur-md shadow-xl overflow-hidden transition-all duration-300 ${menuOpen ? 'max-h-96 border-t border-gray-100' : 'max-h-0'}`}>
                            <div className="px-4 py-4 flex flex-col gap-2">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => scrollTo(item.id)}
                                        className="text-left px-4 py-3 rounded-xl text-gray-700 font-medium hover:bg-mint-light/50 hover:text-mint-dark transition-colors">
                                        {item.label}
                                    </button>
                                ))}
                                <button onClick={() => scrollTo('apply')}
                                    className="shimmer-btn text-white px-4 py-3 rounded-xl font-bold shadow-md mt-2">
                                    第0期生として申し込む
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* ===== HERO ===== */}
                    <section id="top" className="hero-bg noise min-h-screen flex items-center relative pt-20">
                        {/* Decorative blobs */}
                        <div className="absolute top-1/4 right-1/4 w-72 h-72 rounded-full bg-mint/20 filter blur-[80px] animate-blob" style={{animationDelay:'0s'}}></div>
                        <div className="absolute bottom-1/3 left-1/4 w-64 h-64 rounded-full bg-salmon/20 filter blur-[80px] animate-blob" style={{animationDelay:'3s'}}></div>

                        <div className="max-w-5xl mx-auto px-4 sm:px-6 relative z-10 py-20 text-center">
                            {/* Badge */}
                            <div className="animate-fadeUp" style={{animationDelay:'0.1s'}}>
                                <span className="inline-flex items-center gap-2 badge-zero px-5 py-2 rounded-full font-black text-sm shadow-lg mb-8">
                                    <Star size={14} /> 第0期生 テストフライト｜先着3名限定
                                </span>
                            </div>

                            {/* Main headline */}
                            <div className="animate-fadeUp" style={{animationDelay:'0.25s'}}>
                                <p className="font-serif text-white/60 text-xl md:text-2xl mb-3 tracking-widest">あなたの30年は、まだ言葉になっていない</p>
                                <h1 className="font-serif font-black text-white leading-tight mb-4" style={{fontSize:'clamp(2.4rem, 6vw, 4.2rem)'}}>
                                    経験を<span className="text-gradient-gold">「言語化」</span>する<br/>
                                    <span className="text-gradient">3ヶ月</span>が、<br/>
                                    キャリアを再加速させる。
                                </h1>
                            </div>

                            {/* Sub */}
                            <div className="animate-fadeUp" style={{animationDelay:'0.45s'}}>
                                <p className="text-white/80 text-lg md:text-xl leading-relaxed max-w-2xl mx-auto mb-10">
                                    「書けないのではなく、まだ言葉になっていないだけ」<br/>
                                    50代が持つ豊かな経験を、WhyとHowで言語化し、<br className="hidden md:block"/>
                                    LinkedInから社会資本へ。<br/>
                                    その先に、自分の言葉で書かれた<br className="hidden md:block"/>
                                    <span className="text-white font-bold">一冊の本の形に体系化する出版企画案</span>が、<br className="hidden md:block"/>
                                    次のステージへの扉を開く。
                                </p>
                            </div>

                            {/* CTAs */}
                            <div className="animate-fadeUp flex flex-col sm:flex-row gap-4 justify-center" style={{animationDelay:'0.6s'}}>
                                <button onClick={() => scrollTo('apply')}
                                    className="shimmer-btn text-white px-10 py-4 rounded-full font-bold text-lg shadow-2xl hover:-translate-y-1 transition-transform">
                                    第0期生として申し込む（先着3名）
                                </button>
                                <button onClick={() => scrollTo('method')}
                                    className="bg-white/10 backdrop-blur-sm text-white border border-white/30 px-8 py-4 rounded-full font-bold text-base hover:bg-white/20 transition-colors">
                                    言語化メソッドを見る
                                </button>
                            </div>

                            {/* Scroll hint */}
                            <div className="animate-fadeIn mt-16 text-white/30 text-xs tracking-widest" style={{animationDelay:'1.2s'}}>
                                ↓ scroll
                            </div>
                        </div>
                    </section>

                    {/* ===== WHY SECTION ===== */}
                    <section id="why" className="py-24 bg-paper relative overflow-hidden">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6">

                            {/* Opening quote */}
                            <Reveal className="mb-20">
                                <div className="quote-card rounded-3xl p-8 md:p-12 relative">
                                    <span className="quote-mark">"</span>
                                    <blockquote className="relative z-10">
                                        <p className="font-serif text-2xl md:text-4xl font-bold text-ink leading-relaxed mb-6">
                                            経験は資産だが、<br/>
                                            <span className="underline-key">言葉にして初めて価値になる。</span>
                                        </p>
                                        <footer className="text-gray-500 text-base font-medium">— ランチタイムウェビナー「50代のキャリアを再加速させるLinkedIn×セカンドキャリア戦略」より</footer>
                                    </blockquote>
                                </div>
                            </Reveal>

                            <Reveal className="text-center mb-16">
                                <span className="text-salmon-dark font-bold text-sm tracking-widest uppercase">The Problem</span>
                                <h2 className="font-serif font-black text-3xl md:text-4xl mt-3 mb-4 text-ink">その経験、なぜ伝わらないのか？</h2>
                            </Reveal>

                            <div className="grid md:grid-cols-3 gap-6 mb-16">
                                {[
                                    {
                                        icon: "📄",
                                        title: "Whatの羅列に終わっている",
                                        desc: "「やってきたこと」のボリュームは豊富。しかし採用側や社外の人が知りたいのは、なぜ・どうやって、という奥にある物語。書類からストーリーが見えない。",
                                    },
                                    {
